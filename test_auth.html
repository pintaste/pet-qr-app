<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="checkLocalStorage()">Check localStorage</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <div id="output"></div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function testLogin() {
            try {
                const response = await fetch(`${API_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpass'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log('Login successful:', data);

                    // Simulate storing in localStorage like Zustand would
                    const authData = {
                        state: {
                            user: {
                                id: data.user_id,
                                email: data.email,
                                role: data.role,
                                tenant_id: data.tenant_id
                            },
                            accessToken: data.access_token,
                            refreshToken: data.refresh_token,
                            isAuthenticated: true,
                        },
                        version: 0
                    };

                    localStorage.setItem('auth-store', JSON.stringify(authData));
                    document.getElementById('output').innerHTML = `<p style="color: green;">Login successful! Tokens stored.</p>`;
                } else {
                    const error = await response.json();
                    document.getElementById('output').innerHTML = `<p style="color: red;">Login failed: ${error.detail}</p>`;
                }
            } catch (error) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Network error: ${error.message}</p>`;
            }
        }

        function checkLocalStorage() {
            const authStore = localStorage.getItem('auth-store');
            if (authStore) {
                const parsed = JSON.parse(authStore);
                document.getElementById('output').innerHTML = `<pre>localStorage data:\n${JSON.stringify(parsed, null, 2)}</pre>`;
            } else {
                document.getElementById('output').innerHTML = `<p>No auth data in localStorage</p>`;
            }
        }

        function clearStorage() {
            localStorage.removeItem('auth-store');
            document.getElementById('output').innerHTML = `<p>localStorage cleared</p>`;
        }
    </script>
</body>
</html>
