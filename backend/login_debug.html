<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
</head>
<body>
    <h1>Simple Login Test</h1>

    <div>
        <label>Email:</label>
        <input type="email" id="email" value="testuser@example.com">
    </div>

    <div>
        <label>Password:</label>
        <input type="password" id="password" value="password123">
    </div>

    <button onclick="testLogin()">Test Login</button>

    <div id="result"></div>

    <script>
        async function testLogin() {
            alert('Function called!');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            console.log('Email:', email, 'Password:', password);

            try {
                console.log('Making request...');
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    resultDiv.innerHTML = `<p style="color: green;">✅ Login successful! Token: ${data.access_token.substring(0, 20)}...</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Login failed: ${data.detail}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">❌ Network error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
